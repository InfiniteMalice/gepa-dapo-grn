name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        run: |
          pytest -q

  build-and-install-wheel:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist/wheel
        run: |
          rm -rf build dist *.egg-info
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Smoke install wheel
        shell: bash
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install --upgrade pip
          /tmp/venv/bin/python -m pip install tomli
          /tmp/venv/bin/python scripts/install_local_wheel.py --prune-other-versions
          /tmp/venv/bin/python -c "import gepa_dapo_grn; print('import ok, version:', getattr(gepa_dapo_grn, '__version__', 'unknown'))"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check .
          black --check .

  publish-test-pypi:
    runs-on: ubuntu-latest
    needs: [lint, build-and-install-wheel]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/project/gepa-dapo-grn/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [lint, build-and-install-wheel, publish-test-pypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/gepa-dapo-grn/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
